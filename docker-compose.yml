services:

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── SNO MCP Server (Backend) ─────────────────────────────────────────────────
  sno-mcp:
    build: .
    command: python src/main.py
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////data/sno_state.db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./playbooks:/app/playbooks     # Hot-reload playbooks without rebuild
      - sno_state:/data

  # ── SNO Ops Console (Streamlit UI) ───────────────────────────────────────────
  sno-ui:
    build: .
    command: >
      streamlit run src/ui/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////data/sno_state.db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - sno-mcp
    volumes:
      - ./playbooks:/app/playbooks
      - sno_state:/data

volumes:
  redis_data:
  sno_state:
